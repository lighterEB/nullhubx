<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NullHubX</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-32x32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="/favicon-16x16.png" sizes="16x16" type="image/png" />
    <link rel="shortcut icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#e00028" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#e00028" />
    <meta name="msapplication-TileColor" content="#e00028" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-prerender="false" class="theme-matrix effects-disabled" style="opacity: 0; transition: opacity 0.15s ease-out;">
    <script>
      try {
        var theme = localStorage.getItem('nullhubx-theme');
        var effects = localStorage.getItem('nullhubx-effects');
        var locale = localStorage.getItem('nullhubx-locale');
        if (theme) {
          document.body.classList.replace('theme-matrix', theme);
          document.documentElement.classList.add(theme);
        }
        if (effects === 'true') document.body.classList.remove('effects-disabled');
        if (locale === 'zh-CN' || locale === 'en-US') {
          document.documentElement.lang = locale;
        }
      } catch (e) {}

      // FOUT mitigation & Navigation redirect mask
      Promise.race([
        document.fonts ? document.fonts.ready : Promise.resolve(),
        new Promise(function(r) { setTimeout(r, 150); })
      ]).then(function() {
        document.body.style.opacity = '1';
        setTimeout(function() { document.body.style.transition = ''; }, 200);
      });
    </script>
    %sveltekit.body%
  </body>
</html>
